<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#4b6cb7);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.main{
    width:600px;
    padding:50px;
    text-align:center;
    border-radius:25px;
    backdrop-filter:blur(18px);
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.25);
    box-shadow:0 25px 60px rgba(0,0,0,.4);
}

.main h1{
    color:white;
    font-size:45px;
    margin-bottom:10px;
}

.main p{
    color:#e5e5e5;
    font-size:18px;
    margin-bottom:45px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

button{
    width:220px;
    height:65px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    transition:.4s;
    font-size:18px;
    font-weight:600;
    overflow:hidden;
    position:relative;
}

button::before{
    content:"";
    position:absolute;
    width:0;
    height:100%;
    top:0;
    left:0;
    transition:.4s;
    z-index:0;
}

button a{
    position:relative;
    z-index:1;
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
    height:100%;
    text-decoration:none;
    color:white;
}

.user{
    background:linear-gradient(135deg,#00b09b,#96c93d);
}

.user::before{
    background:rgba(255,255,255,.15);
}

.admin{
    background:linear-gradient(135deg,#fc466b,#3f5efb);
}

.admin::before{
    background:rgba(255,255,255,.15);
}

button:hover::before{
    width:100%;
}

button:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 20px 35px rgba(0,0,0,.35);
}

.footer{
    margin-top:40px;
    color:#ddd;
    font-size:14px;
}

@media(max-width:650px){

.main{
    width:90%;
    padding:35px;
}

.main h1{
    font-size:34px;
}

button{
    width:100%;
}

.buttons{
    flex-direction:column;
}

}

</style>

</head>
<body>

<div class="main">

<h1> Car Dashboard</h1>

<p>
Manage your cars seamlessly through the Admin Panel or browse the latest collection on the User Page.
</p>

<div class="buttons">

<button class="user">
<a href="./user.html">👤 USER PAGE</a>
</button>

<button class="admin">
<a href="./admin.html">🛠 ADMIN PAGE</a>
</button>

</div>



</div>

</body>
</html>
